name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    name: Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        env:
          MAVEN_CENTRAL_TOKEN_USERNAME: ${{ secrets.MAVEN_CENTRAL_TOKEN_USERNAME }}
          MAVEN_CENTRAL_TOKEN_PASSWORD: ${{ secrets.MAVEN_CENTRAL_TOKEN_PASSWORD }}
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_TOKEN_USERNAME
          server-password: MAVEN_CENTRAL_TOKEN_PASSWORD

      - name: Verify release version
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pom_version="$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)"
          chmod +x gradle-plugin/gradlew
          gradle_version="$(cd gradle-plugin && ./gradlew -q properties | awk -F': ' '/^version:/ {print $2; exit}')"
          test "${pom_version}" = "${tag_version}"
          test "${gradle_version}" = "${tag_version}"

      - name: Normalize and import GPG key
        env:
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        shell: bash
        run: |
          normalized_key="$(mktemp)"
          candidate_key="$(mktemp)"
          printf '%s' "$MAVEN_GPG_PRIVATE_KEY" > "$candidate_key"
          import_succeeded=0
          for decode_depth in 0 1 2 3; do
            candidate_home="$(mktemp -d)"
            if GNUPGHOME="$candidate_home" gpg --batch --import "$candidate_key" >/dev/null 2>&1; then
              export GNUPGHOME="$candidate_home"
              echo "GNUPGHOME=${GNUPGHOME}" >> "$GITHUB_ENV"
              import_succeeded=1
              break
            fi
            next_key="$(mktemp)"
            if ! base64 --decode "$candidate_key" > "$next_key" 2>/dev/null; then
              break
            fi
            candidate_key="$next_key"
          done
          if [ "$import_succeeded" -ne 1 ]; then
            echo "::error::MAVEN_GPG_PRIVATE_KEY is not importable as raw or repeatedly base64-decoded OpenPGP private key material after three decode attempts. Ensure the secret contains the private key itself or a base64-wrapped copy of it."
            exit 1
          fi
          gpg --batch --pinentry-mode loopback --passphrase "$MAVEN_GPG_PASSPHRASE" \
            --armor --export-secret-keys > "$normalized_key"
          if [ ! -s "$normalized_key" ]; then
            echo "::error::Failed to export an armored private key after importing MAVEN_GPG_PRIVATE_KEY."
            exit 1
          fi
          while IFS= read -r line; do
            echo "::add-mask::$line"
          done < "$normalized_key"
          gpg_env_delimiter="EOF_$(uuidgen)"
          {
            echo "MAVEN_GPG_PRIVATE_KEY<<${gpg_env_delimiter}"
            cat "$normalized_key"
            echo "${gpg_env_delimiter}"
          } >> "$GITHUB_ENV"

      - name: Publish Maven artifacts
        env:
          MAVEN_CENTRAL_TOKEN_USERNAME: ${{ secrets.MAVEN_CENTRAL_TOKEN_USERNAME }}
          MAVEN_CENTRAL_TOKEN_PASSWORD: ${{ secrets.MAVEN_CENTRAL_TOKEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: mvn -B -Prelease -pl .,cli,maven-plugin -am deploy

      - name: Publish Gradle plugin artifacts to Maven Central
        env:
          MAVEN_CENTRAL_TOKEN_USERNAME: ${{ secrets.MAVEN_CENTRAL_TOKEN_USERNAME }}
          MAVEN_CENTRAL_TOKEN_PASSWORD: ${{ secrets.MAVEN_CENTRAL_TOKEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        working-directory: gradle-plugin
        run: ./gradlew publishAllPublicationsToCentralPortalOssrhStagingRepository

      - name: Finalize Gradle plugin Maven Central deployment
        env:
          MAVEN_CENTRAL_TOKEN_USERNAME: ${{ secrets.MAVEN_CENTRAL_TOKEN_USERNAME }}
          MAVEN_CENTRAL_TOKEN_PASSWORD: ${{ secrets.MAVEN_CENTRAL_TOKEN_PASSWORD }}
        shell: bash
        run: |
          auth="$(printf '%s:%s' "${MAVEN_CENTRAL_TOKEN_USERNAME}" "${MAVEN_CENTRAL_TOKEN_PASSWORD}" | base64 -w 0)"
          curl --fail --request POST \
            --header "Authorization: Bearer ${auth}" \
            "https://ossrh-staging-api.central.sonatype.com/manual/upload/defaultRepository/media.barney?publishing_type=automatic"

      - name: Publish Gradle plugin
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        working-directory: gradle-plugin
        run: ./gradlew publishPlugins -Pgradle.publish.key="${GRADLE_PUBLISH_KEY}" -Pgradle.publish.secret="${GRADLE_PUBLISH_SECRET}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v version="${version}" '
            $1 == "##" && $2 == version {
              found = 1
            }
            found {
              if ($1 == "##" && $2 != version) {
                exit
              }
              print
            }
            END {
              if (!found) {
                exit 1
              }
            }
          ' CHANGELOG.md > release-notes.md
          test -s release-notes.md
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes-file release-notes.md
          else
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes-file release-notes.md
          fi
